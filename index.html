<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HR Policy Chatbot</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0a0d14;font-family:'IBM Plex Sans',sans-serif;color:#e2e8f0;}
.app{display:flex;flex-direction:column;height:100vh;}

/* ── Topbar ── */
.topbar{background:#0d111c;border-bottom:1px solid #1a2035;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.logo-mark{width:28px;height:28px;background:#1a56db;border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:16px;height:16px;}
.app-title{font-size:14px;font-weight:600;color:#e2e8f0;letter-spacing:-0.01em;}
.badge{background:#0f2040;border:1px solid #1a3a6e;color:#60a5fa;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 8px;border-radius:4px;display:flex;align-items:center;gap:5px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:#374151;transition:background 0.3s;}
.status-dot.ready{background:#22c55e;}
.status-dot.loading{background:#f59e0b;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* ── Layout ── */
.main{display:flex;flex:1;overflow:hidden;}

/* ── Sidebar ── */
.sidebar{width:230px;background:#0d111c;border-right:1px solid #1a2035;padding:16px 14px;display:flex;flex-direction:column;gap:18px;flex-shrink:0;}
.sidebar-section{font-size:10px;font-weight:600;color:#374151;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;}

.upload-zone{border:1.5px dashed #1e2d45;border-radius:8px;padding:16px 10px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;}
.upload-zone:hover{border-color:#1a56db;background:#0a1628;}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-zone svg{width:22px;height:22px;margin:0 auto 6px;display:block;color:#2d3748;}
.upload-zone p{font-size:11px;color:#4a5568;line-height:1.4;}
.upload-zone .hint{font-size:10px;color:#2d3748;margin-top:4px;}

.doc-item{background:#111827;border:1px solid #1a2035;border-radius:7px;padding:9px 10px;display:flex;align-items:flex-start;gap:8px;}
.doc-icon{width:28px;height:28px;background:#1a2035;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.doc-name{font-size:11px;color:#94a3b8;font-weight:500;word-break:break-all;line-height:1.3;}
.doc-size{font-size:10px;color:#374151;margin-top:2px;}
.indexed-badge{font-size:9px;background:#052e16;border:1px solid #14532d;color:#4ade80;padding:2px 6px;border-radius:3px;margin-top:4px;display:inline-block;}
.error-badge{font-size:9px;background:#2d0a0a;border:1px solid #7f1d1d;color:#f87171;padding:2px 6px;border-radius:3px;margin-top:4px;display:inline-block;}

.progress-bar{height:3px;background:#1a2035;border-radius:2px;margin-top:8px;overflow:hidden;}
.progress-fill{height:100%;background:#1a56db;border-radius:2px;width:0%;transition:width 0.4s;}

.quick-btn{width:100%;text-align:left;background:#111827;border:1px solid #1a2035;color:#64748b;font-size:11px;font-family:'IBM Plex Sans',sans-serif;padding:7px 9px;border-radius:6px;cursor:pointer;margin-bottom:5px;transition:all 0.15s;line-height:1.3;}
.quick-btn:hover{background:#1a2035;color:#94a3b8;border-color:#243050;}
.quick-btn:disabled{opacity:0.35;cursor:not-allowed;}

.clear-btn{width:100%;background:none;border:1px solid #1a2035;border-radius:6px;color:#374151;font-size:11px;font-family:'IBM Plex Sans',sans-serif;padding:7px;cursor:pointer;transition:all 0.15s;}
.clear-btn:hover{border-color:#243050;color:#4a5568;}

/* ── Chat panel ── */
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-header{padding:13px 20px;border-bottom:1px solid #1a2035;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.chat-header-title{font-size:13px;font-weight:500;color:#94a3b8;}
.chat-meta{font-size:11px;color:#2d3748;font-family:'IBM Plex Mono',monospace;}

.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:#1a2035;border-radius:2px;}

.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#1e2d45;}
.empty-state svg{width:38px;height:38px;opacity:0.35;}
.empty-state p{font-size:13px;color:#2d3748;text-align:center;line-height:1.6;}

.msg{display:flex;gap:10px;animation:fadeUp 0.22s ease;}
.msg.user{flex-direction:row-reverse;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.avatar{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:600;}
.avatar.bot{background:#1a2d5a;color:#60a5fa;}
.avatar.user{background:#1a3a1a;color:#4ade80;}

.bubble{max-width:80%;padding:10px 13px;border-radius:10px;font-size:13px;line-height:1.65;}
.bubble.bot{background:#111827;border:1px solid #1a2035;color:#cbd5e1;}
.bubble.user{background:#0f2040;border:1px solid #1a3a6e;color:#bfdbfe;}
.bubble.error{background:#1a0a0a;border:1px solid #7f1d1d;color:#f87171;}

.sources-label{font-size:10px;color:#374151;margin-top:10px;margin-bottom:4px;font-family:'IBM Plex Mono',monospace;}
.source-pill{display:inline-block;background:#0a1628;border:1px solid #1a2d4a;color:#3b82f6;font-size:10px;font-family:'IBM Plex Mono',monospace;padding:3px 7px;border-radius:3px;margin:2px 3px 2px 0;line-height:1.4;}

.typing{display:flex;gap:4px;align-items:center;padding:10px 13px;background:#111827;border:1px solid #1a2035;border-radius:10px;}
.typing span{width:6px;height:6px;background:#374151;border-radius:50%;animation:bounce 1.1s infinite;}
.typing span:nth-child(2){animation-delay:0.18s;}
.typing span:nth-child(3){animation-delay:0.36s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

/* ── Input bar ── */
.input-bar{padding:14px 20px;border-top:1px solid #1a2035;background:#0d111c;flex-shrink:0;}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.input-box{flex:1;background:#111827;border:1px solid #1e2d45;border-radius:8px;padding:10px 13px;color:#e2e8f0;font-family:'IBM Plex Sans',sans-serif;font-size:13px;resize:none;outline:none;transition:border-color 0.2s;line-height:1.5;max-height:100px;}
.input-box:focus{border-color:#1a56db;}
.input-box::placeholder{color:#2d3748;}
.send-btn{background:#1a56db;border:none;border-radius:8px;width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s;}
.send-btn:hover{background:#2563eb;}
.send-btn:disabled{background:#1a2035;cursor:not-allowed;}
.send-btn svg{width:16px;height:16px;}
.input-hint{font-size:10px;color:#1e2d45;margin-top:7px;font-family:'IBM Plex Mono',monospace;}
</style>
</head>
<body>
<div class="app">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16" fill="none">
          <rect x="2" y="2" width="5" height="5" rx="1" fill="white" opacity="0.9"/>
          <rect x="9" y="2" width="5" height="5" rx="1" fill="white" opacity="0.6"/>
          <rect x="2" y="9" width="5" height="5" rx="1" fill="white" opacity="0.6"/>
          <rect x="9" y="9" width="5" height="5" rx="1" fill="white" opacity="0.3"/>
        </svg>
      </div>
      <div class="app-title">HR Policy Chatbot</div>
    </div>
    <div class="badge">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">watsonx.ai · granite-13b</span>
    </div>
  </div>

  <div class="main">

    <!-- Sidebar -->
    <div class="sidebar">
      <div>
        <div class="sidebar-section">Document</div>
        <div class="upload-zone" id="uploadZone">
          <input type="file" accept=".pdf" id="fileInput" onchange="handleFileUpload(this)"/>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
          </svg>
          <p>Drop HR Policy PDF here</p>
          <div class="hint">or click to browse</div>
        </div>

        <div class="progress-bar" id="progressBar" style="display:none;">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div id="docInfo" style="margin-top:8px;display:none;"></div>
      </div>

      <div>
        <div class="sidebar-section">Quick questions</div>
        <button class="quick-btn" id="q1" disabled onclick="quickAsk(this.textContent)">What is the leave policy for new employees?</button>
        <button class="quick-btn" id="q2" disabled onclick="quickAsk(this.textContent)">How many sick days am I entitled to?</button>
        <button class="quick-btn" id="q3" disabled onclick="quickAsk(this.textContent)">What is the remote work policy?</button>
        <button class="quick-btn" id="q4" disabled onclick="quickAsk(this.textContent)">How do I raise a grievance?</button>
      </div>

      <div style="margin-top:auto;">
        <button class="clear-btn" onclick="clearChat()">Clear conversation</button>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-panel">
      <div class="chat-header">
        <span class="chat-header-title" id="chatTitle">Upload a document to begin</span>
        <span class="chat-meta" id="msgCount">0 messages</span>
      </div>

      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
          </svg>
          <p>Upload your HR policy PDF<br/>and start asking questions</p>
        </div>
      </div>

      <div class="input-bar">
        <div class="input-row">
          <textarea class="input-box" id="inputBox" rows="1"
            placeholder="Ask anything about your HR policy..."
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
            disabled></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
            </svg>
          </button>
        </div>
        <div class="input-hint">Answers grounded in your uploaded document · IBM watsonx.ai RAG</div>
      </div>
    </div>
  </div>
</div>

<script>
const API = '';  // empty = same origin (app.py serves this file)
let msgCount = 0;
let isReady = false;
let isWaiting = false;

// ── Upload ────────────────────────────────────────────────────────────
async function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;

  setStatus('loading', 'Uploading & indexing...');
  showProgress(true);
  animateProgress();

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch(`${API}/upload`, { method: 'POST', body: formData });
    const data = await res.json();

    if (!res.ok) throw new Error(data.detail || 'Upload failed');

    showProgress(false);
    showDocInfo(data.meta, true);
    enableChat(data.meta.name);
    setStatus('ready', 'watsonx.ai · granite-13b');
    addBotMessage(`Document indexed successfully. I processed <strong>${data.meta.pages} pages</strong> across <strong>${data.meta.chunks} chunks</strong>. Ask me anything about your HR policies.`, []);

  } catch (err) {
    showProgress(false);
    showDocInfo({ name: file.name }, false, err.message);
    setStatus('idle', 'Error — try again');
  }
}

// ── Ask ───────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('inputBox');
  const question = input.value.trim();
  if (!question || isWaiting) return;

  input.value = '';
  input.style.height = 'auto';
  addUserMessage(question);
  showTyping(true);
  setInputEnabled(false);
  isWaiting = true;

  try {
    const res = await fetch(`${API}/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question })
    });
    const data = await res.json();

    showTyping(false);
    if (!res.ok) throw new Error(data.detail || 'Something went wrong');
    addBotMessage(data.answer, data.sources);

  } catch (err) {
    showTyping(false);
    addErrorMessage(err.message);
  } finally {
    isWaiting = false;
    if (isReady) setInputEnabled(true);
  }
}

function quickAsk(q) {
  document.getElementById('inputBox').value = q;
  sendMessage();
}

// ── UI helpers ────────────────────────────────────────────────────────
function addUserMessage(text) {
  removeEmpty();
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="avatar user">You</div><div class="bubble user">${escHtml(text)}</div>`;
  msgs.appendChild(div);
  scroll();
  updateCount();
}

function addBotMessage(text, sources) {
  removeEmpty();
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg';
  let srcHtml = '';
  if (sources && sources.length) {
    srcHtml = `<div class="sources-label">Sources used</div>` +
      sources.map(s => `<span class="source-pill">${escHtml(s.substring(0, 90))}…</span>`).join('');
  }
  div.innerHTML = `<div class="avatar bot">W</div><div class="bubble bot">${text}${srcHtml}</div>`;
  msgs.appendChild(div);
  scroll();
  updateCount();
}

function addErrorMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `<div class="avatar bot">W</div><div class="bubble error">Error: ${escHtml(text)}</div>`;
  msgs.appendChild(div);
  scroll();
}

function showTyping(show) {
  const existing = document.getElementById('typingIndicator');
  if (show && !existing) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg';
    div.id = 'typingIndicator';
    div.innerHTML = `<div class="avatar bot">W</div><div class="typing"><span></span><span></span><span></span></div>`;
    msgs.appendChild(div);
    scroll();
  } else if (!show && existing) {
    existing.remove();
  }
}

function showDocInfo(meta, success, errMsg) {
  const el = document.getElementById('docInfo');
  el.style.display = 'block';
  const badge = success
    ? `<span class="indexed-badge">✓ Indexed · ${meta.pages} pages · ${meta.chunks} chunks</span>`
    : `<span class="error-badge">✗ ${errMsg || 'Failed'}</span>`;
  el.innerHTML = `
    <div class="doc-item">
      <div class="doc-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5" style="width:14px;height:14px;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
        </svg>
      </div>
      <div style="overflow:hidden;min-width:0;">
        <div class="doc-name">${escHtml(meta.name)}</div>
        ${badge}
      </div>
    </div>`;
  document.getElementById('uploadZone').style.display = 'none';
}

function enableChat(docName) {
  isReady = true;
  setInputEnabled(true);
  document.getElementById('chatTitle').textContent = `${docName} — Ask anything`;
  document.querySelectorAll('.quick-btn').forEach(b => b.disabled = false);
}

function setInputEnabled(enabled) {
  document.getElementById('inputBox').disabled = !enabled;
  document.getElementById('sendBtn').disabled = !enabled;
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (state === 'ready' ? ' ready' : state === 'loading' ? ' loading' : '');
  document.getElementById('statusText').textContent = text;
}

function showProgress(show) {
  document.getElementById('progressBar').style.display = show ? 'block' : 'none';
  if (!show) document.getElementById('progressFill').style.width = '0%';
}

function animateProgress() {
  let w = 0;
  const fill = document.getElementById('progressFill');
  const iv = setInterval(() => {
    w = Math.min(w + Math.random() * 12, 90);
    fill.style.width = w + '%';
    if (w >= 90) clearInterval(iv);
  }, 300);
}

function clearChat() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  msgCount = 0;
  document.getElementById('msgCount').textContent = '0 messages';
  if (!isReady) {
    msgs.innerHTML = `<div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="width:38px;height:38px;opacity:0.35;">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
      </svg>
      <p>Upload your HR policy PDF<br/>and start asking questions</p>
    </div>`;
  }
}

function removeEmpty() {
  const e = document.getElementById('emptyState');
  if (e) e.remove();
}

function updateCount() {
  msgCount++;
  document.getElementById('msgCount').textContent = `${msgCount} message${msgCount !== 1 ? 's' : ''}`;
}

function scroll() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
</script>
</body>
</html>
